<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <title>FocusBlock</title>
</head>
<body>
  <div class="container">
    <h1>FocusBlock</h1>
    <p class="subtitle">Lock in and eliminate distractions.</p>
    
    <div class="form-group">
      <input type="text" id="url-input" placeholder="e.g. instagram.com" autocomplete="off" />
    </div>
    
    <div class="form-group">
      <div class="time-wrapper">
        <input type="number" id="time-input" placeholder="Minutes" min="1" autocomplete="off" />
        <span class="unit">min</span>
      </div>
    </div>
    
    <button id="block-btn">Block Website</button>
    
    <div class="divider"></div>
    
    <div class="active-blocks">
      <h2>Active Blocks</h2>
      <ul id="block-list">
        <!-- JS will populate this -->
      </ul>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
