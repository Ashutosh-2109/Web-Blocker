<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Website Blocked</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="block-container">
    <div class="icon">🛑</div>
    <h1>Focus Mode Active</h1>
    <p>You have blocked <strong id="domain-name">this site</strong>.</p>
    <div class="timer-container">
      <div class="timer-label">Unlocks in</div>
      <div id="time-left" class="timer">00:00:00</div>
    </div>
    <button id="close-btn">Close Tab</button>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
